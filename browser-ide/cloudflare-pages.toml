# Cloudflare Pages configuration for mml2vgm Browser IDE
# https://developers.cloudflare.com/pages/configuration/

# Build configuration
[build]
# Command to run to build the project
command = "npm run build"

# Directory to output the build result
publish = "dist"

# The root directory of your project (where package.json is)
root = "browser-ide"

# Environment variables (optional)
# [build.env]
# NODE_VERSION = "18"

# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

# Headers for all pages (required for SharedArrayBuffer in Web Workers)
# These headers are required for Chrome/Edge to allow SharedArrayBuffer usage
# which is needed by WASM in Web Workers
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

# WASM file headers
# Ensure WASM files are served with correct MIME type
[[headers]]
  for = "/assets/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"

# Cache settings for WASM files
[[headers]]
  for = "/assets/*.wasm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JS module headers for worker files
# Workers need the same COOP/COEP headers to load WASM with SharedArrayBuffer
[[headers]]
  for = "/assets/compilerWorker-*.js"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
