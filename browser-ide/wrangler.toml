# Cloudflare Pages project configuration
# Name of the project in Cloudflare Pages dashboard
name = "mml2vgm-browser-ide"

# For Pages deployments via Wrangler CLI
# Build is handled by the dashboard or cloudflare-pages.toml

# Required headers for WASM SharedArrayBuffer support
[[headers]]
  for = "/"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

[[headers]]
  for = "/wasm/*"
  [headers.values]
    Content-Type = "application/wasm"
    Cache-Control = "public, max-age=31536000, immutable"
